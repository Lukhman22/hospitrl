# OpenEnv Specification for HospitRL
environment_id: "hospitrl"
version: "1.0.0"

tasks:
  - id: "stable_wards"
    name: "Quiet Shift"
    description: "Maintain hospital pressure below 0.6 for 20 steps."
    difficulty: "easy"
    target_score: 0.9

  - id: "midday_rush"
    name: "Midday Rush"
    description: "Keep pressure below 0.8 during steady patient arrivals."
    difficulty: "medium"
    target_score: 0.8

  - id: "emergency_surge"
    name: "Crisis Management"
    description: "Survive the Step 10 surge (15-25 patients) without exceeding 0.9 pressure."
    difficulty: "hard"
    target_score: 0.7

metadata:
  domain: "Healthcare"
  tags: ["hospital-management", "surge-logic"]